<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us – Mailto Link Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <style>
    :root {
      --orange: #FF6B35; --navy: #1A1F3A; --cream: #FFF8F0; --text-dark: #1A1F3A;
      --text-mid: #4A5268; --border: #E8EDF5; --radius-lg: 24px;
    }
    body { font-family: 'Cabinet Grotesk', sans-serif; background: var(--cream); color: var(--text-dark); line-height: 1.7; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 100px auto; padding: 0 24px; text-align: center; }
    .contact-card { background: white; padding: 48px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: 0 24px 64px rgba(26,31,58,0.1); }
    h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 16px; letter-spacing: -0.02em; }
    p { color: var(--text-mid); margin-bottom: 32px; }
    .email-box { background: var(--cream); padding: 20px; border-radius: 16px; border: 1px dashed var(--orange); margin-bottom: 24px; }
    .email-address { font-size: 1.2rem; font-weight: 700; color: var(--orange); text-decoration: none; word-break: break-all; }
    .btn-contact { display: inline-block; background: var(--orange); color: white; padding: 14px 32px; border-radius: 50px; font-weight: 800; text-decoration: none; transition: transform 0.2s; }
    .btn-contact:hover { transform: translateY(-2px); }
    .back-link { display: inline-block; margin-bottom: 32px; color: var(--orange); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Back to Generator</a>
    <div class="contact-card">
      <h1>Get in Touch</h1>
      <p>Have a suggestion, found a bug, or want to collaborate on a project? I'd love to hear from you.</p>
      
      <div class="email-box">
        <a href="mailto:nikedino121@gmail.com" class="email-address">nikedino121@gmail.com</a>
      </div>

      <a href="mailto:nikedino121@gmail.com?subject=Inquiry%20from%20Mailto%20Generator" class="btn-contact">Send Message</a>
    </div>
  </div>
</body>
</html>
